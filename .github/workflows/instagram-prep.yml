name: Instagram投稿準備

on:
  schedule:
    - cron: '0 22 * * 0'  # 毎週日曜 22:00 UTC = 月曜 07:00 JST
  workflow_dispatch:       # 手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Noto CJKフォントインストール
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Python依存関係インストール
        run: pip install Pillow google-api-python-client google-auth

      - name: Instagram画像生成 & Driveアップロード & LINE通知
        env:
          GOOGLE_CREDENTIALS:    ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          LINE_CHANNEL_TOKEN:    ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID:          ${{ secrets.LINE_USER_ID }}
        run: python scripts/generate_instagram.py
