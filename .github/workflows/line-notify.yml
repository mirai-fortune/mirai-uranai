name: 週次タロット LINE通知

on:
  schedule:
    - cron: '0 8 * * 1'  # 毎週月曜 17:00 JST (08:00 UTC)
  workflow_dispatch:       # 手動実行も可能

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 今週のタロット情報を取得してLINE通知
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python3 << 'PYEOF'
          import json, re, os, urllib.request
          from datetime import date, timedelta

          today = date.today()
          monday = today - timedelta(days=today.weekday())
          monday_key = monday.strftime("%Y-%m-%d")

          with open("占い/weekly/index.html", encoding="utf-8") as f:
              content = f.read()

          start = content.find(f'"{monday_key}"')
          if start != -1:
              block = content[start:start+2000]
              name_match = re.search(r'nameJp:"([^"]+)"', block)
              theme_match = re.search(r'theme:\s*"([^"]+)"', block)
              card_jp = name_match.group(1) if name_match else "今週のカード"
              theme = theme_match.group(1) if theme_match else "今週のメッセージ"
          else:
              print(f"今週（{monday_key}）のコンテンツが見つかりません")
              exit(1)

          text = (
              f"✦ 今週のタロット｜{card_jp}「{theme}」\n\n"
              "今週あなたへのメッセージが届いています。\n\n"
              "▼ 受け取る\n"
              "https://mirai-fortune.github.io/mirai-uranai/占い/weekly/\n\n"
              "※ 20:00 にブロードキャスト配信してください"
          )

          body = json.dumps({
              "to": os.environ["LINE_USER_ID"],
              "messages": [{"type": "text", "text": text}]
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://api.line.me/v2/bot/message/push",
              data=body,
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {os.environ['LINE_CHANNEL_TOKEN']}"
              },
              method="POST"
          )
          try:
              with urllib.request.urlopen(req) as res:
                  print(f"LINE通知成功: {res.status}")
          except Exception as e:
              print(f"LINE通知失敗: {e}")
              raise
          PYEOF
