<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — ページが見つかりません | ASUMIRA 占い</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23030611'/><text x='16' y='23' font-family='Georgia,serif' font-size='20' font-weight='400' fill='%23c4a86a' text-anchor='middle'>A</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
:root {
  --bg-color: #030611;
  --bg-gradient-end: #060504;
  --cream: #f5f2eb;
  --muted: rgba(245,242,235,.6);
  --gold: #c4a86a;
  --gold-glow: rgba(196, 168, 106, 0.15);
  --glass-bg: rgba(20, 18, 15, 0.4);
  --glass-border: rgba(255, 255, 255, 0.08);
  --font-serif: 'Noto Serif JP', serif;
  --font-sans: 'Noto Sans JP', sans-serif;
}
body {
  background: linear-gradient(135deg, var(--bg-color) 0%, var(--bg-gradient-end) 100%);
  background-attachment: fixed;
  color: var(--cream);
  font-family: var(--font-sans);
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
#particle-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: -1;
  pointer-events: none;
}
h1 { font-family: var(--font-serif); font-weight: 400; letter-spacing: 0.05em; }
.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

/* --- HEADER --- */
header {
  padding: 24px 0;
  position: fixed;
  width: 100%;
  top: 0; z-index: 100;
  background: linear-gradient(to bottom, rgba(3,6,17,0.9), transparent);
}
.header-wrap { display: flex; align-items: center; }
.logo { font-family: var(--font-serif); font-size: 1.4rem; letter-spacing: 0.1em; color: var(--cream); text-decoration: none; line-height: 1.2; white-space: nowrap; }
.logo:hover { color: var(--gold); transition: color 0.3s; }

/* --- 404 MAIN --- */
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.not-found-inner {
  text-align: center;
  padding: 40px 24px;
}

/* オーラ光彩 */
.not-found-inner::before {
  content: "";
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 60vw; height: 60vw;
  background: radial-gradient(circle, rgba(196, 168, 106, 0.12) 0%, transparent 65%);
  filter: blur(60px);
  z-index: 0;
  animation: auraPulse 6s infinite alternate ease-in-out;
  pointer-events: none;
}
@keyframes auraPulse {
  0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.6; }
  100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
}

.error-num {
  font-family: var(--font-serif);
  font-size: clamp(5rem, 18vw, 10rem);
  font-weight: 300;
  letter-spacing: 0.2em;
  color: transparent;
  background: linear-gradient(135deg, var(--gold) 0%, rgba(196,168,106,0.4) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  line-height: 1;
  margin-bottom: 8px;
  animation: fadeIn 1s ease forwards;
  opacity: 0;
  position: relative;
  z-index: 1;
}

.divider {
  width: 40px;
  height: 1px;
  background: var(--gold);
  margin: 24px auto;
  opacity: 0.5;
  animation: fadeIn 1s 0.3s ease forwards;
  opacity: 0;
  position: relative;
  z-index: 1;
}

.error-title {
  font-size: clamp(1.2rem, 4vw, 1.8rem);
  font-weight: 400;
  letter-spacing: 0.1em;
  line-height: 1.8;
  margin-bottom: 24px;
  animation: fadeIn 1s 0.4s ease forwards;
  opacity: 0;
  position: relative;
  z-index: 1;
}

.error-desc {
  color: var(--muted);
  font-size: 0.9rem;
  letter-spacing: 0.06em;
  line-height: 2;
  margin-bottom: 48px;
  animation: fadeIn 1s 0.6s ease forwards;
  opacity: 0;
  position: relative;
  z-index: 1;
}

.btn-home {
  display: inline-block;
  padding: 16px 48px;
  border: 1px solid rgba(196,168,106,0.5);
  color: var(--gold);
  text-decoration: none;
  font-family: var(--font-sans);
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  transition: background 0.3s, color 0.3s, border-color 0.3s;
  animation: fadeIn 1s 0.8s ease forwards;
  opacity: 0;
  position: relative;
  z-index: 1;
}
.btn-home:hover {
  background: rgba(196,168,106,0.1);
  color: var(--cream);
  border-color: var(--gold);
}

@keyframes fadeIn { to { opacity: 1; } }
/* ===== PINK SAKURA THEME ===== */
html.theme-sakura {
  --bg-color: #160810;
  --bg-gradient-end: #0a0508;
  --cream: #fef2f6;
  --muted: rgba(254,242,246,0.6);
  --gold: #e891b2;
  --gold-glow: rgba(232,145,178,0.18);
  --glass-bg: rgba(35,10,22,0.45);
  --glass-border: rgba(255,180,210,0.1);
}
html.theme-sakura header { background: linear-gradient(to bottom, rgba(22,8,16,0.9), transparent); }
html.theme-sakura nav { background: rgba(22,8,16,0.92) !important; border-bottom-color: rgba(255,180,210,0.1); }
html.theme-sakura body { background: linear-gradient(135deg, #160810 0%, #0a0508 100%) fixed; }
html.theme-shinryoku {
  --bg-color: #060e08;
  --bg-gradient-end: #030804;
  --cream: #f0f5ef;
  --muted: rgba(240,245,239,0.6);
  --gold: #82c87e;
  --gold-glow: rgba(130,200,126,0.18);
  --glass-bg: rgba(8,22,10,0.45);
  --glass-border: rgba(170,230,160,0.1);
}
html.theme-shinryoku header { background: linear-gradient(to bottom, rgba(6,14,8,0.9), transparent); }
html.theme-shinryoku nav { background: rgba(6,14,8,0.92) !important; border-bottom-color: rgba(170,230,160,0.1); }
html.theme-shinryoku body { background: linear-gradient(135deg, #060e08 0%, #030804 100%) fixed; }
/* ===== THEME SWITCHER ===== */
.theme-switcher { position: relative; }
.theme-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--glass-border); background: var(--glass-bg);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: border-color 0.3s; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.theme-btn:hover { border-color: var(--gold); }
.theme-picker {
  position: absolute; top: calc(100% + 10px); right: 0;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: 12px; padding: 10px;
  display: none; flex-direction: column; gap: 6px;
  min-width: 150px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 300;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
}
.theme-picker.open { display: flex; }
.theme-option {
  display: flex; align-items: center; gap: 10px; padding: 7px 10px;
  border-radius: 8px; cursor: pointer; font-size: 0.8rem; color: var(--muted);
  border: 1px solid transparent; transition: background 0.2s, border-color 0.2s, color 0.2s;
  background: transparent; width: 100%; text-align: left; font-family: var(--font-sans);
}
.theme-option:hover { background: rgba(255,255,255,0.06); color: var(--cream); }
.theme-option.active { border-color: var(--gold); color: var(--cream); }
.theme-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.theme-dot-gold { background: radial-gradient(circle at 35% 35%, #e8d09a, #c4a86a); }
.theme-dot-sakura { background: radial-gradient(circle at 35% 35%, #ffb8d0, #e891b2); }
.theme-dot-shinryoku { background: radial-gradient(circle at 35% 35%, #c0ea9a, #6dbf6a); }
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<header>
  <div class="container header-wrap">
    <a href="https://mirai-fortune.github.io/mirai-uranai/" class="logo">ASUMIRA 占い</a>
    <div class="theme-switcher" id="theme-switcher">
      <button class="theme-btn" id="theme-btn" aria-label="テーマを変更する" title="テーマ変更">🎨</button>
      <div class="theme-picker" id="theme-picker">
        <button class="theme-option active" data-theme="gold"><span class="theme-dot theme-dot-gold"></span>星空</button>
        <button class="theme-option" data-theme="sakura"><span class="theme-dot theme-dot-sakura"></span>桜花</button>
        <button class="theme-option" data-theme="shinryoku"><span class="theme-dot theme-dot-shinryoku"></span>新緑</button>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="container not-found-inner">
    <div class="error-num">404</div>
    <div class="divider"></div>
    <h1 class="error-title">このページは<br>星の地図にありません</h1>
    <p class="error-desc">
      お探しのページは存在しないか、移動した可能性があります。<br>
      道に迷ったときこそ、星が導いてくれます。
    </p>
    <a href="https://mirai-fortune.github.io/mirai-uranai/" class="btn-home">トップページへ戻る</a>
  </div>
</main>

<script>
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let particlesArray = [];
  let mouse = { x: null, y: null, radius: 100 };

  window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
  window.addEventListener('mouseout', () => { mouse.x = undefined; mouse.y = undefined; });
  window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initParticles(); });

  const colorPalette = [
    'rgba(245, 242, 235, ',
    'rgba(196, 168, 106, ',
    'rgba(230, 190, 130, ',
    'rgba(160, 205, 215, '
  ];

  class MinatoMiraiParticle {
    constructor(x, y, size, baseColor, waveSpeed, waveRange) {
      this.x = x; this.y = y; this.size = size; this.baseColor = baseColor;
      this.angle = Math.random() * Math.PI * 2;
      this.waveSpeed = waveSpeed; this.waveRange = waveRange;
      this.speedY = (Math.random() * 0.15) + 0.05;
      this.directionY = Math.random() > 0.5 ? 1 : -1;
      this.alpha = Math.random() * 0.4 + 0.1;
      this.alphaSpeed = (Math.random() * 0.02) + 0.005;
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
      ctx.fillStyle = `${this.baseColor}${this.alpha})`;
      ctx.fill();
    }
    update() {
      if (this.y > canvas.height) this.y = 0;
      if (this.y < 0) this.y = canvas.height;
      let dx = mouse.x - this.x;
      let dy = mouse.y - this.y;
      let distance = Math.sqrt(dx*dx + dy*dy);
      if (distance < mouse.radius + this.size) {
        this.x -= (dx / distance) * 1.5;
        this.y -= (dy / distance) * 1.5;
      } else {
        this.angle += this.waveSpeed;
        this.x += Math.sin(this.angle) * this.waveRange * 0.05;
        this.y += this.speedY * this.directionY;
      }
      this.alpha += Math.sin(this.angle * 0.5) * this.alphaSpeed;
      if (this.alpha > 0.5) this.alpha = 0.5;
      if (this.alpha < 0.05) this.alpha = 0.05;
      this.draw();
    }
  }

  function initParticles() {
    particlesArray = [];
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let numberOfParticles = (canvas.height * canvas.width) / 16000;
    for (let i = 0; i < numberOfParticles; i++) {
      let size = (Math.random() * 1.5) + 0.4;
      let x = Math.random() * canvas.width;
      let y = Math.random() * canvas.height;
      let colorIndex = Math.floor(Math.random() * colorPalette.length);
      if (colorIndex === 3 && Math.random() > 0.2) colorIndex = Math.floor(Math.random() * 3);
      let baseColor = colorPalette[colorIndex];
      let waveSpeed = (Math.random() * 0.015) + 0.005;
      let waveRange = (Math.random() * 8) + 2;
      particlesArray.push(new MinatoMiraiParticle(x, y, size, baseColor, waveSpeed, waveRange));
    }
  }

  let shootingStars = [];
  let ssLastTime = 0;
  let ssNextDelay = 2500 + Math.random() * 4000;

  class ShootingStar {
    constructor() {
      this.x = canvas.width  * (0.45 + Math.random() * 0.55);
      this.y = canvas.height * (Math.random() * 0.28);
      const angle = (155 + Math.random() * 15) * Math.PI / 180;
      const speed = 5 + Math.random() * 4;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.length = 90 + Math.random() * 80;
      this.life = 0;
      this.maxLife = 60 + Math.random() * 35;
      this.opacity = 0;
      const mag = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
      this.nx = -this.vx / mag;
      this.ny = -this.vy / mag;
    }
    update() {
      this.life++;
      this.x += this.vx;
      this.y += this.vy;
      const p = this.life / this.maxLife;
      this.opacity = p < 0.15 ? p / 0.15 : p > 0.65 ? Math.max(0, 1 - (p - 0.65) / 0.35) : 1;
    }
    draw() {
      const tailX = this.x + this.nx * this.length;
      const tailY = this.y + this.ny * this.length;
      const grad = ctx.createLinearGradient(this.x, this.y, tailX, tailY);
      grad.addColorStop(0,    `rgba(255,252,245,${this.opacity})`);
      grad.addColorStop(0.25, `rgba(230,210,165,${this.opacity * 0.7})`);
      grad.addColorStop(0.7,  `rgba(196,168,106,${this.opacity * 0.2})`);
      grad.addColorStop(1,    'rgba(196,168,106,0)');
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(tailX, tailY);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.shadowColor = 'rgba(255,245,200,0.55)';
      ctx.shadowBlur = 6;
      ctx.stroke();
      const bloom = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 9);
      bloom.addColorStop(0,   `rgba(255,255,252,${this.opacity})`);
      bloom.addColorStop(0.35,`rgba(240,225,180,${this.opacity * 0.5})`);
      bloom.addColorStop(1,   'rgba(196,168,106,0)');
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 9, 0, Math.PI * 2);
      ctx.fillStyle = bloom;
      ctx.fill();
      ctx.restore();
    }
    isDead() { return this.life >= this.maxLife; }
  }

  function animateParticles(timestamp) {
    requestAnimationFrame(animateParticles);
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    for (let i = 0; i < particlesArray.length; i++) {
      particlesArray[i].update();
    }
    if (!ssLastTime) ssLastTime = timestamp;
    if (timestamp - ssLastTime > ssNextDelay) {
      shootingStars.push(new ShootingStar());
      ssLastTime = timestamp;
      ssNextDelay = 2500 + Math.random() * 5000;
    }
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      shootingStars[i].update();
      shootingStars[i].draw();
      if (shootingStars[i].isDead()) shootingStars.splice(i, 1);
    }
  }

  initParticles();
  animateParticles();
/* ===== テーマ管理 ===== */
(function() {
  function setTheme(theme) {
    var html = document.documentElement;
    html.classList.remove('theme-sakura', 'theme-shinryoku');
    if (theme === 'sakura') html.classList.add('theme-sakura');
    else if (theme === 'shinryoku') html.classList.add('theme-shinryoku');
    localStorage.setItem('asumira-theme', theme);
    document.querySelectorAll('.theme-option').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.theme === theme);
    });
  }
  var themeBtn = document.getElementById('theme-btn');
  var themePicker = document.getElementById('theme-picker');
  if (themeBtn && themePicker) {
    themeBtn.addEventListener('click', function(e) { e.stopPropagation(); themePicker.classList.toggle('open'); });
    document.addEventListener('click', function() { themePicker.classList.remove('open'); });
    themePicker.addEventListener('click', function(e) { e.stopPropagation(); });
    document.querySelectorAll('.theme-option').forEach(function(btn) {
      btn.addEventListener('click', function() { setTheme(btn.dataset.theme); themePicker.classList.remove('open'); });
    });
  }
  setTheme(localStorage.getItem('asumira-theme') || 'gold');
})();
</script>
</body>
</html>
